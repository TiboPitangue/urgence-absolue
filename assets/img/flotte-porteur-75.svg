<rect x="255" y="192" width="405" height="15" fill="#C1372A"/>
<text x="457" y="232" font-family="Arial Black,Arial,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1.5">URGENCE ABSOLUE</text><text x="457" y="253" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,.4)" text-anchor="middle" letter-spacing="2">GROUPE L.P.E</text>
<!-- Rear lights -->
<rect x="660" y="88" width="12" height="32" rx="3" fill="#C1372A"/>


<rect x="68" y="262" width="604" height="10" rx="2" fill="#0f0f0f"/>

