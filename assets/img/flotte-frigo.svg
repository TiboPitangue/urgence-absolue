<rect x="248" y="180" width="458" height="16" fill="#C1372A"/>
<text x="477" y="222" font-family="Arial Black,Arial,sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1.5">URGENCE ABSOLUE</text><text x="477" y="244" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,.4)" text-anchor="middle" letter-spacing="2">GROUPE L.P.E</text>
